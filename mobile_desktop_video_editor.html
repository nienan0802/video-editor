<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>手機電腦通用影片剪輯器</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d7dce8;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #15965d;
      --danger: #d92d20;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", sans-serif;
      background: linear-gradient(180deg, #eef3ff, var(--bg));
      color: var(--text);
    }
    .wrap { width: min(960px, 100%); margin: 0 auto; padding: 22px; }
    .card {
      background: var(--card);
      border-radius: 22px;
      box-shadow: 0 18px 55px rgba(31, 41, 55, .12);
      padding: 24px;
      margin: 18px 0;
    }
    h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 38px); }
    .lead { margin: 0; color: var(--muted); line-height: 1.75; }
    .notice {
      background: #eff6ff;
      color: #1e3a8a;
      border: 1px solid #bfdbfe;
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.65;
      margin-top: 16px;
    }
    label { display: block; font-weight: 700; margin: 16px 0 8px; }
    input[type="file"], input[type="number"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 16px;
      background: #fff;
    }
    video {
      width: 100%;
      max-height: 520px;
      background: #111827;
      border-radius: 18px;
      margin-top: 16px;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    button, .download {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 13px 17px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      line-height: 1.2;
    }
    button { background: var(--primary); color: white; }
    button:hover { background: var(--primary-dark); }
    button.secondary { background: #edf1f7; color: #243043; }
    button.danger { background: var(--danger); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .download { display: inline-block; background: var(--success); color: white; }
    .status {
      white-space: pre-wrap;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      color: #374151;
      margin-top: 18px;
      line-height: 1.7;
      min-height: 56px;
    }
    .bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
    }
    .bar > div {
      height: 100%;
      width: 0%;
      background: var(--primary);
      transition: width .2s ease;
    }
    .small { font-size: 14px; color: var(--muted); line-height: 1.7; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .chip {
      background: #f3f4f6;
      color: #374151;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 14px;
    }
    @media (max-width: 640px) {
      .wrap { padding: 12px; }
      .card { padding: 18px; border-radius: 18px; }
      .grid { grid-template-columns: 1fr; }
      button, .download { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>影片剪輯器</h1>
      <p class="lead">手機、平板、電腦都能用。選影片、設定開始與結束時間，直接在瀏覽器輸出剪好的影片。</p>
      <div class="notice">第一次使用需要連網載入 FFmpeg 核心。影片只在你的裝置上處理，不會上傳。</div>
    </section>

    <section class="card">
      <label for="file">1. 選擇影片</label>
      <input id="file" type="file" accept="video/*" />

      <video id="preview" controls playsinline></video>

      <div class="chips">
        <span class="chip" id="durationChip">影片長度：尚未載入</span>
        <span class="chip" id="sizeChip">檔案大小：尚未載入</span>
      </div>

      <label>2. 設定剪輯時間</label>
      <div class="grid">
        <div>
          <label for="start">開始時間（秒）</label>
          <input id="start" type="number" min="0" step="0.1" value="0" />
        </div>
        <div>
          <label for="end">結束時間（秒）</label>
          <input id="end" type="number" min="0" step="0.1" value="5" />
        </div>
      </div>

      <div class="buttons">
        <button class="secondary" id="markStart">目前位置設為開始</button>
        <button class="secondary" id="markEnd">目前位置設為結束</button>
        <button class="secondary" id="playRange">預覽剪輯區間</button>
      </div>

      <label for="mode">3. 輸出模式</label>
      <select id="mode">
        <option value="copy">快速剪輯：不重新編碼，速度快，但起點可能不完全精準</option>
        <option value="encode">精準剪輯：重新編碼，較慢，但時間較準</option>
      </select>

      <div class="buttons">
        <button id="cut" disabled>剪出影片</button>
        <button id="reset" class="danger">清除</button>
        <a id="download" class="download" style="display:none;" download="clip.mp4">下載剪好的影片</a>
      </div>

      <div class="bar"><div id="progress"></div></div>
      <div class="status" id="status">請先選擇影片。</div>

      <p class="small">
        小提醒：手機記憶體有限，建議先剪短影片或較小檔案。若影片非常大，請用電腦版 Chrome / Edge 會比較穩。
      </p>
    </section>
  </main>

  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
  <script>
    const { FFmpeg } = FFmpegWASM;

    const fileInput = document.getElementById("file");
    const preview = document.getElementById("preview");
    const startInput = document.getElementById("start");
    const endInput = document.getElementById("end");
    const markStartBtn = document.getElementById("markStart");
    const markEndBtn = document.getElementById("markEnd");
    const playRangeBtn = document.getElementById("playRange");
    const cutBtn = document.getElementById("cut");
    const resetBtn = document.getElementById("reset");
    const download = document.getElementById("download");
    const statusBox = document.getElementById("status");
    const progress = document.getElementById("progress");
    const durationChip = document.getElementById("durationChip");
    const sizeChip = document.getElementById("sizeChip");
    const modeSelect = document.getElementById("mode");

    let ffmpeg = null;
    let videoFile = null;
    let objectUrl = null;
    let resultUrl = null;
    let playingRange = false;

    function status(text) { statusBox.textContent = text; }
    function setProgress(value) { progress.style.width = `${Math.max(0, Math.min(100, value))}%`; }

    function formatBytes(bytes) {
      const units = ["B", "KB", "MB", "GB"];
      let size = bytes || 0;
      let unit = 0;
      while (size >= 1024 && unit < units.length - 1) { size /= 1024; unit++; }
      return `${size.toFixed(unit === 0 ? 0 : 1)} ${units[unit]}`;
    }

    function secondsToTime(sec) {
      const s = Number(sec || 0);
      const mm = Math.floor(s / 60);
      const ss = (s % 60).toFixed(1).padStart(4, "0");
      return `${mm}:${ss}`;
    }

    function getExt(name) {
      const parts = name.split(".");
      return parts.length > 1 ? parts.pop().toLowerCase() : "mp4";
    }

    async function loadFFmpeg() {
      if (ffmpeg && ffmpeg.loaded) return;

      ffmpeg = new FFmpeg();

      ffmpeg.on("log", ({ message }) => {
        if (message) console.log(message);
      });

      ffmpeg.on("progress", ({ progress: p }) => {
        if (Number.isFinite(p)) setProgress(Math.round(p * 100));
      });

      status("正在載入 FFmpeg 核心……第一次使用會比較久。");
      setProgress(5);

      await ffmpeg.load({
        coreURL: "https://unpkg.com/@ffmpeg/core@0.12.10/dist/umd/ffmpeg-core.js"
      });

      setProgress(0);
      status("FFmpeg 載入完成，可以開始剪片。");
    }

    fileInput.addEventListener("change", () => {
      videoFile = fileInput.files && fileInput.files[0];
      if (!videoFile) return;

      if (objectUrl) URL.revokeObjectURL(objectUrl);
      if (resultUrl) URL.revokeObjectURL(resultUrl);

      objectUrl = URL.createObjectURL(videoFile);
      preview.src = objectUrl;
      download.style.display = "none";
      cutBtn.disabled = true;
      setProgress(0);

      sizeChip.textContent = `檔案大小：${formatBytes(videoFile.size)}`;
      durationChip.textContent = "影片長度：讀取中";
      status("影片讀取中……");
    });

    preview.addEventListener("loadedmetadata", () => {
      const duration = preview.duration || 0;
      durationChip.textContent = `影片長度：約 ${duration.toFixed(2)} 秒`;
      startInput.value = "0";
      endInput.value = Math.min(5, duration).toFixed(1);
      cutBtn.disabled = false;
      status(`影片已讀取。可以剪輯 ${secondsToTime(startInput.value)} 到 ${secondsToTime(endInput.value)}。`);
    });

    preview.addEventListener("error", () => {
      status("影片無法預覽。可能是瀏覽器不支援這個影片編碼；仍可嘗試剪輯，或換 Chrome / Edge 開啟。");
      cutBtn.disabled = !videoFile;
    });

    markStartBtn.addEventListener("click", () => {
      startInput.value = preview.currentTime.toFixed(1);
      status(`開始時間已設為 ${secondsToTime(startInput.value)}。`);
    });

    markEndBtn.addEventListener("click", () => {
      endInput.value = preview.currentTime.toFixed(1);
      status(`結束時間已設為 ${secondsToTime(endInput.value)}。`);
    });

    playRangeBtn.addEventListener("click", async () => {
      const start = Number(startInput.value);
      const end = Number(endInput.value);
      if (!validateRange(start, end)) return;
      playingRange = true;
      preview.currentTime = start;
      await preview.play();
      status(`正在預覽 ${secondsToTime(start)} 到 ${secondsToTime(end)}。`);
    });

    preview.addEventListener("timeupdate", () => {
      if (playingRange && preview.currentTime >= Number(endInput.value)) {
        preview.pause();
        playingRange = false;
      }
    });

    function validateRange(start, end) {
      if (!videoFile) {
        alert("請先選擇影片。");
        return false;
      }
      if (!Number.isFinite(start) || !Number.isFinite(end) || start < 0 || end <= start) {
        alert("請確認開始與結束時間，結束時間必須大於開始時間。");
        return false;
      }
      if (preview.duration && end > preview.duration + 0.2) {
        alert("結束時間不能超過影片長度。");
        return false;
      }
      return true;
    }

    cutBtn.addEventListener("click", async () => {
      const start = Number(startInput.value);
      const end = Number(endInput.value);
      const duration = end - start;
      if (!validateRange(start, end)) return;

      cutBtn.disabled = true;
      download.style.display = "none";
      setProgress(0);

      try {
        await loadFFmpeg();

        const inputExt = getExt(videoFile.name);
        const inputName = `input.${inputExt}`;
        const outputName = "clip.mp4";

        status("正在讀取影片到剪輯器……");
        const data = new Uint8Array(await videoFile.arrayBuffer());

        try { await ffmpeg.deleteFile(inputName); } catch (e) {}
        try { await ffmpeg.deleteFile(outputName); } catch (e) {}

        await ffmpeg.writeFile(inputName, data);

        const mode = modeSelect.value;
        let args;

        if (mode === "copy") {
          args = [
            "-ss", String(start),
            "-i", inputName,
            "-t", String(duration),
            "-c", "copy",
            "-movflags", "faststart",
            outputName
          ];
          status("正在快速剪輯……這個模式速度較快，但起點可能略有誤差。");
        } else {
          args = [
            "-ss", String(start),
            "-i", inputName,
            "-t", String(duration),
            "-c:v", "libx264",
            "-preset", "ultrafast",
            "-crf", "23",
            "-c:a", "aac",
            "-b:a", "128k",
            "-movflags", "faststart",
            outputName
          ];
          status("正在精準剪輯並重新編碼……手機上可能需要一點時間。");
        }

        await ffmpeg.exec(args);

        status("正在產生下載檔……");
        const output = await ffmpeg.readFile(outputName);
        const blob = new Blob([output.buffer], { type: "video/mp4" });

        if (resultUrl) URL.revokeObjectURL(resultUrl);
        resultUrl = URL.createObjectURL(blob);

        download.href = resultUrl;
        download.download = `clip_${Date.now()}.mp4`;
        download.style.display = "inline-block";
        setProgress(100);
        status(`完成！已剪出 ${duration.toFixed(1)} 秒影片，請按「下載剪好的影片」。`);

        try { await ffmpeg.deleteFile(inputName); } catch (e) {}
        try { await ffmpeg.deleteFile(outputName); } catch (e) {}
      } catch (err) {
        console.error(err);
        setProgress(0);
        status(
          "剪輯失敗：\n" +
          (err && err.message ? err.message : err) +
          "\n\n建議：\n1. 換 Chrome / Edge 開啟\n2. 先用較短、較小的影片測試\n3. 若快速剪輯失敗，改用精準剪輯\n4. iPhone 若檔案太大，建議改用電腦"
        );
      } finally {
        cutBtn.disabled = false;
      }
    });

    resetBtn.addEventListener("click", () => {
      fileInput.value = "";
      videoFile = null;
      preview.removeAttribute("src");
      preview.load();
      startInput.value = "0";
      endInput.value = "5";
      durationChip.textContent = "影片長度：尚未載入";
      sizeChip.textContent = "檔案大小：尚未載入";
      download.style.display = "none";
      cutBtn.disabled = true;
      setProgress(0);
      status("已清除。請重新選擇影片。");
      if (objectUrl) URL.revokeObjectURL(objectUrl);
      if (resultUrl) URL.revokeObjectURL(resultUrl);
      objectUrl = null;
      resultUrl = null;
    });
  </script>
</body>
</html>
